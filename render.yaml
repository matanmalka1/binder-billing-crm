services:
  - type: web
    name: backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python scripts/bootstrap_tax_calendar.py && gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"

      - key: APP_ENV
        value: production

      - key: LOG_LEVEL
        value: INFO

      - key: LOG_FORMAT
        value: json

      - key: LOG_SQL
        value: "false"

      - key: LOG_SLOW_REQUEST_MS
        value: "500"

      - key: LOG_SLOW_QUERY_MS
        value: "250"

      - key: LOG_HIGH_QUERY_COUNT
        value: "20"

      - key: AUTH_LOGIN_RATE_LIMIT
        value: "5/minute"

      - key: JWT_ALGORITHM
        value: HS256

      - key: AUTH_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"

      - key: AUTH_REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"

      - key: REFRESH_COOKIE_NAME
        value: refresh_token

      - key: REFRESH_COOKIE_PATH
        value: /api/v1/auth

      - key: REFRESH_COOKIE_SAMESITE
        value: none

      - key: PASSWORD_RESET_TOKEN_EXPIRE_MINUTES
        value: "30"

      - key: PASSWORD_RESET_DEV_LOG
        value: "false"

      - key: FRONTEND_PASSWORD_RESET_URL
        sync: false

      # Sentry (optional)
      - key: SENTRY_ENABLED
        value: "false"

      - key: SENTRY_DSN
        sync: false

      - key: SENTRY_ENVIRONMENT
        value: production

      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.0"

      # Set in Render dashboard — do not commit secrets
      - key: DATABASE_URL
        sync: false

      - key: JWT_SECRET
        sync: false

      - key: CORS_ALLOWED_ORIGINS
        sync: false

      # Notifications (Brevo)
      - key: NOTIFICATIONS_ENABLED
        value: "true"

      - key: BREVO_API_KEY
        sync: false

      - key: BREVO_API_URL
        value: https://api.brevo.com/v3/smtp/email

      - key: EMAIL_FROM_ADDRESS
        sync: false

      - key: EMAIL_FROM_NAME
        sync: false

      # Invoice provider
      - key: INVOICE_PROVIDER_BASE_URL
        sync: false

      - key: INVOICE_PROVIDER_API_KEY
        sync: false

      # Storage (Cloudflare R2 / AWS S3)
      - key: R2_ACCESS_KEY_ID
        sync: false

      - key: R2_SECRET_ACCESS_KEY
        sync: false

      - key: R2_BUCKET_NAME
        sync: false

      - key: R2_ENDPOINT_URL
        sync: false

      - key: R2_REGION
        value: auto
