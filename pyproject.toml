[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
  ".venv",
  "venv",
  "alembic",
  "migrations",
  "seed",
  "__pycache__",
]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes: undefined names, unused imports
  "I",   # import sorting
  "B",   # bugbear: risky bug patterns
  "UP",  # pyupgrade
]
ignore = [
  "E501", # line length handled by formatter / line-length
  "B008", # FastAPI Depends/Query false positives
]

[tool.ruff.lint.isort]
known-first-party = ["app", "tests"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"


[tool.pylint.main]
ignore = [
  ".venv",
  "venv",
  "migrations",
  "__pycache__",
  "alembic",
  "seed",
]

[tool.pylint.messages_control]
disable = ["all"]
enable = [
  # bugs / risky flow
  "used-before-assignment",
  "unreachable",
  "assignment-from-no-return",

  # exception handling
  "bare-except",
  "broad-exception-caught",
  "raise-missing-from",

  # architecture smells
  "duplicate-code",
  "cyclic-import",
]

[tool.pylint.similarities]
min-similarity-lines = 16
ignore-comments = true
ignore-docstrings = true
ignore-imports = true

[tool.pylint.design]
max-branches = 15
max-statements = 60
max-locals = 25

[tool.pylint.format]
max-line-length = 100

[tool.pytest.ini_options]
pythonpath = ["."]
[tool.vulture]
paths = ["app", "tests", "alembic"]
exclude = [".venv", "venv", "migrations", "seed"]
ignore_decorators = ["@app.*", "@router.*"]
min_confidence = 80
sort_by_size = true