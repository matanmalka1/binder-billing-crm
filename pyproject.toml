[tool.pylint.main]
ignore = [
  ".venv",
  "venv",
  "migrations",
  "__pycache__",
  "alembic",
  "seed",
]

[tool.pylint.messages_control]
disable = ["all"]
enable = [
  # real bugs
  "undefined-variable",
  "used-before-assignment",
  "unreachable",

  # imports / dead code
  "unused-import",
  "unused-variable",

  # risky code
  "dangerous-default-value",
  "bare-except",
  "raise-missing-from",

  # architecture smells
  "duplicate-code",
  "cyclic-import",
]

[tool.pylint.similarities]
min-similarity-lines = 16
ignore-comments = true
ignore-docstrings = true
ignore-imports = true

[tool.pylint.design]
max-branches = 15
max-statements = 60
max-locals = 25