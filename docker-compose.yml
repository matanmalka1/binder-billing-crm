services:
  postgres:
    image: postgres:16
    container_name: binder-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: binder_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d binder_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
